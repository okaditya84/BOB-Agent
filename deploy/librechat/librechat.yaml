# BOBAI — LibreChat configuration (Bank of Baroda hackathon build)
# Providers, web search, voice and admin features are wired to the keys present
# in .env. See services/* for the Identity Trust, KYC and Assistant backends that
# agents call via OpenAPI Actions (allow-listed below) / MCP.
version: 1.3.13
cache: true

# ----------------------------------------------------------------------------
# Interface / branding + admin capabilities (agents, prompts, groups, sharing)
# ----------------------------------------------------------------------------
interface:
  customWelcome: 'Welcome to BOBAI — your secure Bank of Baroda assistant. Ask about account opening, documents, deposits and loans.'
  fileSearch: true
  modelSelect: true
  parameters: true
  presets: true
  bookmarks: true
  multiConvo: true
  # Admins/users can build and SHARE prompts...
  prompts:
    use: true
    create: true
    share: true
    public: false
  # ...and build and SHARE agents (the core "admin builds agents" requirement).
  agents:
    use: true
    create: true
    share: true
    public: false
  # Share targets: individual users, groups, and roles.
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: true
  fileCitations: true

# Email/password registration on by default; add social logins once OAuth creds exist.
registration:
  socialLogins: []

# ----------------------------------------------------------------------------
# LLM providers (keys come from .env; switch/extend freely)
# Google (Gemini) is built-in via GOOGLE_KEY. OpenRouter + Groq added as custom.
# ----------------------------------------------------------------------------
endpoints:
  custom:
    - name: 'OpenRouter'
      apiKey: '${OPENROUTER_KEY}'
      baseURL: 'https://openrouter.ai/api/v1'
      headers:
        x-librechat-body-parentmessageid: '{{LIBRECHAT_BODY_PARENTMESSAGEID}}'
      models:
        default:
          - 'openai/gpt-4o-mini'
          - 'google/gemini-2.0-flash-001'
          - 'meta-llama/llama-3.3-70b-instruct'
          - 'anthropic/claude-3.5-haiku'
        fetch: true
      titleConvo: true
      titleModel: 'openai/gpt-4o-mini'
      dropParams: ['stop']
      modelDisplayLabel: 'OpenRouter'

    - name: 'Groq'
      apiKey: '${GROQ_API_KEY}'
      baseURL: 'https://api.groq.com/openai/v1/'
      models:
        default:
          - 'llama-3.3-70b-versatile'
          - 'llama-3.1-8b-instant'
          - 'gemma2-9b-it'
        fetch: true
      titleConvo: true
      titleModel: 'llama-3.1-8b-instant'
      modelDisplayLabel: 'Groq'

# ----------------------------------------------------------------------------
# Web search — Tavily (search + scraper) with Serper as an additional provider
# ----------------------------------------------------------------------------
webSearch:
  searchProvider: tavily
  scraperProvider: tavily
  tavilyApiKey: '${TAVILY_API_KEY}'
  serperApiKey: '${SERPER_API_KEY}'
  tavilySearchOptions:
    searchDepth: basic
    maxResults: 5

# ----------------------------------------------------------------------------
# Voice — speech-to-text via Groq's Whisper (uses the existing GROQ_API_KEY).
# Text-to-speech can be added later (ElevenLabs) or handled by the browser.
# ----------------------------------------------------------------------------
speech:
  stt:
    openai:
      url: 'https://api.groq.com/openai/v1/audio/transcriptions'
      apiKey: '${GROQ_API_KEY}'
      model: 'whisper-large-v3'

# ----------------------------------------------------------------------------
# OpenAPI Actions: allow agents to call the BOBAI backend services.
# (host.docker.internal lets the LibreChat container reach services on the host.)
# Identity Trust :8001 · KYC :8002 · Assistant :8003
# ----------------------------------------------------------------------------
actions:
  allowedAddresses:
    - 'host.docker.internal:8001'
    - 'host.docker.internal:8002'
    - 'host.docker.internal:8003'
    - '127.0.0.1:8001'
    - '127.0.0.1:8002'
    - '127.0.0.1:8003'

# BOBAI MCP server — one server exposing document-guidance, KYC and identity-risk
# tools. Admins attach this in the UI; every agent then gains these capabilities.
mcpServers:
  bobai:
    type: streamable-http
    url: http://host.docker.internal:8004/mcp
    timeout: 60000

# Allow LibreChat to reach the MCP server on the Docker host.
mcpSettings:
  allowedAddresses:
    - 'host.docker.internal:8004'
